name: CI (Release)
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    outputs:
      artifact-id: ${{ steps.upload-artifact.outputs.artifact-id }}

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: true

    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '6.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish -p:PublishSingleFile=true -p:CommitHash=${{ github.sha }} -p:CommitRef=${{ github.ref_type }}/${{ github.ref_name }} -r win-x64 -c Release --self-contained false .\Bloxstrap\Bloxstrap.csproj

    - name: Upload Artifact
      id: upload-artifact
      uses: actions/upload-artifact@v7
      with:
        name: Stabilis (Release) (${{ github.sha }})
        path: .\Bloxstrap\bin\Release\net6.0-windows\win-x64\publish\*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      # When SIGNPATH_API_TOKEN is set, sign via SignPath; otherwise attach an unsigned build to the release.
      - name: Sign and download artifact (SignPath)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v2.0
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '107b3de5-057b-42fc-a985-3546e4261775'
          project-slug: 'bloxstrap'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'github-ci'
          github-artifact-id: '${{ needs.build.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'release'

      - name: Download build artifact (unsigned)
        if: ${{ secrets.SIGNPATH_API_TOKEN == '' }}
        uses: actions/download-artifact@v4
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: artifact

      # Publish outputs Stabilis.exe; SignPath may still be configured for Bloxstrap.exe — accept either.
      - name: Prepare release binary
        shell: bash
        run: |
          set -euo pipefail
          dest="Stabilis-${{ github.ref_name }}.exe"
          if [[ -d release ]]; then
            if [[ -f release/Stabilis.exe ]]; then mv release/Stabilis.exe "$dest"; exit 0; fi
            if [[ -f release/Bloxstrap.exe ]]; then mv release/Bloxstrap.exe "$dest"; exit 0; fi
          fi
          if [[ -d artifact ]]; then
            exe="$(find artifact -type f \( -name Stabilis.exe -o -name Bloxstrap.exe \) | head -n1)"
            if [[ -n "$exe" ]]; then mv "$exe" "$dest"; exit 0; fi
          fi
          echo "::error::No Stabilis.exe or Bloxstrap.exe found (signed output or downloaded artifact)"
          ls -laR release artifact 2>/dev/null || true
          exit 1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: Stabilis-${{ github.ref_name }}.exe
          name: Stabilis ${{ github.ref_name }}

  release-test:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/release-test')
    permissions:
      contents: write

    steps:
      - name: Sign and download artifact (SignPath)
        if: ${{ secrets.SIGNPATH_API_TOKEN != '' }}
        uses: signpath/github-action-submit-signing-request@v2.0
        with:
          api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
          organization-id: '107b3de5-057b-42fc-a985-3546e4261775'
          project-slug: 'bloxstrap'
          signing-policy-slug: 'release-signing'
          artifact-configuration-slug: 'github-ci'
          github-artifact-id: '${{ needs.build.outputs.artifact-id }}'
          wait-for-completion: true
          output-artifact-directory: 'release'

      - name: Download build artifact (unsigned)
        if: ${{ secrets.SIGNPATH_API_TOKEN == '' }}
        uses: actions/download-artifact@v4
        with:
          artifact-ids: ${{ needs.build.outputs.artifact-id }}
          path: artifact

      - name: Prepare release binary
        shell: bash
        run: |
          set -euo pipefail
          dest="Stabilis-${{ github.ref_name }}.exe"
          if [[ -d release ]]; then
            if [[ -f release/Stabilis.exe ]]; then mv release/Stabilis.exe "$dest"; exit 0; fi
            if [[ -f release/Bloxstrap.exe ]]; then mv release/Bloxstrap.exe "$dest"; exit 0; fi
          fi
          if [[ -d artifact ]]; then
            exe="$(find artifact -type f \( -name Stabilis.exe -o -name Bloxstrap.exe \) | head -n1)"
            if [[ -n "$exe" ]]; then mv "$exe" "$dest"; exit 0; fi
          fi
          echo "::error::No Stabilis.exe or Bloxstrap.exe found (signed output or downloaded artifact)"
          ls -laR release artifact 2>/dev/null || true
          exit 1

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: Stabilis-${{ github.ref_name }}.exe
          name: Stabilis ${{ github.ref_name }}
