name: Publish to Winget

on:
  release:
    types: [released]

jobs:
  publish:
    if: ${{ secrets.WINGET_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: pizzaboxer.Bloxstrap
          token: ${{ secrets.WINGET_TOKEN }}
